<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Videoteca - Iniciar Sesión</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <h:outputStylesheet library="css" name="styles.css"/>
</h:head>

<h:body styleClass="login-page">

    <div class="login-container">
        <div class="login-logo">
            <i class="pi pi-video" style="font-size: 3rem; color: #6366f1;"></i>
            <h1>VideoTeca</h1>
            <p>Sistema de Gestión de Videos</p>
        </div>

        <h:form id="loginForm" styleClass="login-form">
            <p:messages id="mensajes" showDetail="true" closable="true"/>

            <div class="field">
                <p:outputLabel for="usuario" value="Usuario"/>
                <p:inputText id="usuario"
                             value="#{loginBean.usuario}"
                             placeholder="Ingresa tu usuario"
                             required="true"
                             requiredMessage="El usuario es requerido"
                             styleClass="w-full"/>
            </div>

            <div class="field">
                <p:outputLabel for="contrasena" value="Contraseña"/>
                <p:password id="contrasena"
                            value="#{loginBean.contrasena}"
                            placeholder="Ingresa tu contraseña"
                            required="true"
                            requiredMessage="La contraseña es requerida"
                            feedback="false"
                            styleClass="w-full"/>
            </div>

            <p:commandButton value="Iniciar Sesión"
                             action="#{loginBean.login}"
                             icon="pi pi-sign-in"
                             styleClass="w-full login-btn"
                             update="mensajes"
                             ajax="false"/>
        </h:form>
    </div>

</h:body>
</html>
